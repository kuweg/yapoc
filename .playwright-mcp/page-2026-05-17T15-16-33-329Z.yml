 *fast* serialization and validation library, with builtin support for [JSON](https://json.org), [MessagePack](https://msgpack.org), [YAML](https://yaml.org), and [TOML](https://toml.io/en/). It features: - 🚀 **High performance encoders/decoders**for common protocols. The JSON and MessagePack implementations regularly[benchmark](https://jcristharif.com/msgspec/benchmarks.html)as the fastest options for Python. - 🎉 **Support for a wide variety of Python types**. Additional types may be supported through[extensions](https://jcristharif.com/msgspec/extending.html). - 🔍 **Zero-cost schema validation**using familiar Python type annotations. In[benchmarks](https://jcristharif.com/msgspec/benchmarks.html)`msgspec` decodes*and*validates JSON faster than[orjson](https://github.com/ijl/orjson)can decode it alone. - ✨ **A speedy Struct type**for representing structured data. If you already use[dataclasses](https://docs.python.org/3/library/dataclasses.html)or[attrs](https://www.attrs.org/en/stable/),[structs](https://jcristharif.com/msgspec/structs.html)should feel familiar. However, they're[5-60x faster](https://jcristharif.com/msgspec/benchmarks.html#structs)for common operations. All of this is included in a [lightweight library](https://jcristharif.com/msgspec/benchmarks.html#library-size) with no required dependencies. `msgspec` may be used for serialization alone, as a faster JSON or MessagePack library. For the greatest benefit though, we recommend using `msgspec` to handle the full serialization & validation workflow: **Define** your message schemas using standard Python type annotations. ``` >>> import msgspec >>> class User(msgspec.Struct): ... \"\"\"A new type describing a User\"\"\" ... name: str ... groups: set[str] = set() ... email: str | None = None ``` **Encode** messages as JSON, or one of the many other supported protocols. ``` >>> alice = User(\"alice\", groups={\"admin\", \"engineering\"}) >>> alice User(name='alice', groups={\"admin\", \"engineering\"}, email=None) >>> msg = msgspec.json.encode(alice) >>> msg b'{\"name\":\"alice\",\"groups\":[\"admin\",\"engineering\"],\"email\":null}' ``` **Decode** messages back into Python objects, with optional schema validation. ``` >>> msgspec.json.decode(msg, type=User) User(name='alice', groups={\"admin\", \"engineering\"}, email=None) >>> msgspec.json.decode(b'{\"name\":\"bob\",\"groups\":[123]}', type=User) Traceback (most recent call last): File \"<stdin>\", line 1, in <module> msgspec.ValidationError: Expected `str`, got `int` - at `$.groups[0]` ``` `msgspec` is designed to be as performant as possible, while retaining some of the nicities of validation libraries like [pydantic](https://pydantic.dev/docs/validation/latest/get-started/). For supported types, encoding/decoding a message with `msgspec` can be [~10-80x faster than alternative libraries](https://jcristharif.com/msgspec/benchmarks.html). See [the documentation](https://jcristharif.com/msgspec/) for more information. New BSD. See the [License File](https://github.com/jcrist/msgspec/blob/main/LICENSE). [tool:start] fetch_page {'url': 'https://jcristharif.com/msgspec/benchmarks.html', 'max_chars': 12000} [tool:start] web_search {'query': '\"Pydantic vs msgspec vs validatedata\" site:dev.to', 'max_results': 5} [tool:done] fetch_page Page: https://jcristharif.com/msgspec/benchmarks.html Title: Benchmarks¶ # Benchmarks[¶](#benchmarks) Note Benchmarks are *hard*. Repeatedly calling the same function in a tight loop will lead to the instruction cache staying hot and branches being highly predictable. That’s not representative of real world access patterns. It’s also hard to write a nonbiased benchmark. I wrote msgspec, naturally whatever benchmark I publish it’s going to perform well in. Even so, people like to see benchmarks. I’ve tried to be as nonbiased as I can be, and the results hopefully indicate a few tradeoffs you make when you choose different serialization formats. I encourage you to write your own benchmarks before making these decisions. In all cases benchmarks were run on my local development machine (a ~2020 x86 Linux laptop) using CPython 3.11. ## JSON Serialization & Validation[¶](#json-serialization-validation) This benchmark covers the common case when working with `msgspec` or other validation libraries. It measures two things: Decoding some JSON input, validating it against a schema, and converting it into user-friendly python objects. Encoding these same python objects back into JSON. The data we’re working with has the following schema (defined here using [ msgspec.Struct](api.html#msgspec.Struct) types): ``` import enum import datetime import msgspec class Permissions(enum.Enum): READ = \"READ\" WRITE = \"WRITE\" READ_WRITE = \"READ_WRITE\" class File(msgspec.Struct, kw_only=True, tag=\"file\"): name: str created_by: str created_at: datetime.datetime updated_by: str | None = None updated_at: datetime.datetime | None = None nbytes: int permissions: Permissions class Directory(msgspec.Struct, kw_only=True, tag=\"directory\"): name: str created_by: str created_at: datetime.datetime updated_by: str | None = None updated_at: datetime.datetime | None = None contents: list[File | Directory] ``` The libraries we’re comparing are the following: Each benchmark creates a message containing one or more `File` /`Directory` instances, then serializes, deserializes, and validates it in a loop. The full benchmark source can be found [here](https://github.com/jcrist/msgspec/tree/main/benchmarks/bench_validation). In this benchmark `msgspec` is ~6x faster than `mashumaro` , ~10x faster than `cattrs` , and ~12x faster than `pydantic` V2, and ~85x faster than `pydantic` V1. This plot shows the performance benefit of performing type validation during message decoding (as done by `msgspec` ) rather than as a secondary step with a third-party library like [cattrs](https://catt.rs/en/latest/) or [pydantic](https://pydantic.dev/docs/validation/latest/get-started/) V1. Validating after decoding is slower for two reasons: It requires traversing over the entire output structure a second time (which can be slow due to pointer chasing) It may require converting some python objects to their desired output types (e.g. converting a decoded to a`dict` [pydantic](https://pydantic.dev/docs/validation/latest/get-started/)model), resulting in allocating many temporary python objects. In contrast, libraries like `msgspec` that validate during decoding have none of these issues. Only a single pass over the decoded data is taken, and the specified output types are created correctly the first time, avoiding the need for additional unnecessary allocations. This benefit also shows up in the memory usage for the same benchmark: Here we compare the peak increase in memory usage (RSS) after loading the schemas and data. `msgspec` ’s small library size, schema representation, and in-memory state means it uses a fraction of the memory of other tools. ## JSON Serialization[¶](#json-serialization) `msgspec` includes its own high performance JSON library, which may be used by itself as a replacement for the standard library’s [ json.dumps](https://docs.python.org/3/library/json.html#json.dumps)/ [functions. Here we compare msgspec’s JSON implementation against several other popular Python JSON libraries.](https://docs.python.org/3/library/json.html#json.loads) `json.loads` [msgspec](https://jcristharif.com/msgspec/)(0.18.5)[orjson](https://github.com/ijl/orjson)(3.9.10)[ujson](https://github.com/ultrajson/ultrajson)(5.9.0)[rapidjson](https://github.com/python-rapidjson/python-rapidjson)(1.13)[simdjson](https://github.com/TkTech/pysimdjson)(5.0.2)[json](https://docs.python.org/3/library/json.html)(standard library) The full benchmark source can be found [here](https://github.com/jcrist/msgspec/blob/main/benchmarks/bench_encodings.py). In this case `msgspec structs` (which measures `msgspec` with `msgspec.Struct` schemas pre-defined) is the fastest. When used without schemas, `msgspec` is on-par with `orjson` (the next fastest JSON library). This shows that `msgspec` is able to decode JSON faster when a schema is provided. Due to a more efficient in memory representation, JSON decoding AND schema validation with `msgspec` than just JSON decoding alone. ## MessagePack Serialization[¶](#messagepack-serialization) Likewise, `msgspec` includes its own high performance [MessagePack](https://msgpack.org) library, which may be used by itself without requiring usage of any of msgspec’s validation machinery. Here we compare msgspec’s MessagePack implementation against several other popular Python MessagePack libraries. As with the JSON benchmark above, `msgspec` with a schema provided (``` msgspec structs ``` ) is faster than `msgspec` with no schema. In both cases though `msgspec` is measurably faster than other Python MessagePack libraries like `msgpack` or `ormsgpack` . ## JSON Serialization - Large Data[¶](#json-serialization-large-data) Here we benchmark loading a [large JSON file](https://conda.anaconda.org/conda-forge/noarch/repodata.json) (~77 MiB) containing information on all the `noarch` packages in [conda-forge](https://conda-forge.org/). We compare the following libraries: [msgspec](https://jcristharif.com/msgspec/)(0.18.5)[orjson](https://github.com/ijl/orjson)(3.9.10)[ujson](https://github.com/ultrajson/ultrajson)(5.9.0)[rapidjson](https://github.com/python-rapidjson/python-rapidjson)(1.13)[simdjson](https://github.com/TkTech/pysimdjson)(5.0.2)[json](https://docs.python.org/3/library/json.html)(standard library) For each library, we measure both the peak increase in memory usage (RSS) and the time to JSON decode the file. The full benchmark source can be found [here](https://github.com/jcrist/msgspec/blob/main/benchmarks/bench_large_json.py). **Results (smaller is better):** memory (MiB) | vs. | time (ms) | vs. | | |---|---|---|---|---| | 67.6 | 1.0x | 176.8 | 1.0x | | 218.3 | 3.2x | 630.5 | 3.6x | | 295.0 | 4.4x | 868.6 | 4.9x | | 349.1 | 5.2x | 1087.0 | 6.1x | | 375.0 | 5.6x | 1004.0 | 5.7x | | 406.3 | 6.0x | 691.7 | 3.9x | | 603.2 | 8.9x | 1053.0 | 6.0x | `msgspec` decoding into[Struct](structs.html)types uses the least amount of memory, and is also the fastest to decode. This makes sense;`Struct` types are cheaper to allocate and more memory efficient than`dict` types, and for large messages these differences can really add up.`msgspec` decoding without a schema is the second best option for both memory usage and speed. When decoding without a schema,`msgspec` makes the assumption that the underlying message probably still has some structure; short dict keys are temporarily cached to be reused later on, rather than reallocated every time. This means that instead of allocating 10,000 copies of the string`\"name\"` , only a single copy is allocated and reused. For large messages this can lead to significant memory savings.`json` and`orjson` also use similar optimizations, but not as effectively.`orjson` and`simdjson` use 6-9x more memory than`msgspec` in this benchmark. In addition to the reasons above, both of these decoders require copying the original message into a temporary buffer. In this case, the extra copy adds an extra 77 MiB of overhead! ## Structs[¶](#structs) Here we benchmark common [ msgspec.Struct](api.html#msgspec.Struct) operations, comparing their performance against other similar libraries. The cases compared are: For each library, the following operations are benchmarked: Time to define a new class. Many libraries that abstract away class boilerplate add overhead when defining classes, slowing import times for libraries that make use of these classes. Time to create an instance of that class. Time to compare two instances for equality ( `==` /`!=` ).Time to compare two instances for order ( `<` /`>` /`<=` /`>=` ) The full benchmark source can be found [here](https://github.com/jcrist/msgspec/blob/main/benchmarks/bench_structs.py). **Results (smaller is better):** import (μs) | create (μs) | equality (μs) | order (μs) | | |---|---|---|---|---| | 12.51 | 0.09 | 0.02 | 0.03 | | 7.88 | 0.35 | 0.08 | 0.16 | | 483.10 | 0.37 | 0.14 | 1.87 | | 506.09 | 0.36 | 0.14 | 0.16 | | 673.47 | 1.54 | 0.60 | N/A | Standard Python classes are the fastest to import (any library can only add overhead here). Still, `msgspec` isn’t*that*much slower, especially compared to other options.Structs are optimized to be cheap to create, and that shows for the creation benchmark. They’re roughly 4x faster than standard classes/ `attrs` /`dataclasses` , and 17x faster than`pydantic` .For equality comparison, msgspec Structs are roughly 4x to 30x faster than the alternatives. For order comparison, msgspec Structs are roughly 5x to 60x faster than the alternatives. ## Garbage Collection[¶](#garbage-collection) [ msgspec.Struct](api.html#msgspec.Struct) instances implement several optimizations for reducing garbage collection (GC) pressure and decreasing memory usage. Here we benchmark structs (with and without [gc=False](structs.html#struct-gc)) against standard Python classes (with and without [__slots__](https://docs.python.org/3/reference/datamodel.html#slots)). For each option we create a large dictionary containing many simple instances of the benchmarked type, then measure: The amount of time it takes to do a full garbage collection (gc) pass The total amount of memory used by this data structure The full benchmark source can be found [here](https://github.com/jcrist/msgspec/blob/main/benchmarks/bench_gc.py). **Results (smaller is better):** GC time (ms) | Memory Used (MiB) | | |---|---|---| | 80.46 | 211.66 | | 80.06 | 120.11 | | 13.96 | 120.11 | | 1.07 | 104.85 | Standard Python classes are the most memory hungry (since all data is stored in an instance dict). They also result in the largest GC pause, as the GC has to traverse the entire outer dict, each class instance, and each instance dict. All that pointer chasing has a cost. Standard classes with `__slots__` are less memory hungry, but still results in an equivalent GC pauses.instances have the same memory layout as a class with`msgspec.Struct` `__slots__` (and thus have the same memory usage), but due to deferred GC tracking a full GC pass completes in a fraction of the time.instances with`msgspec.Struct` `gc=False` have the lowest memory usage (lack of GC reduces memory by 16 bytes per instance). They also have the lowest GC pause (75x faster than standard classes!) since the entire composing dict can be skipped during GC traversal. ## Library Size[¶](#library-size) Here we compare the on-disk size of `msgspec` and `pydantic` , its closest equivalent. The full benchmark source can be found [here](https://github.com/jcrist/msgspec/blob/main/benchmarks/bench_library_size.py). **Results (smaller is better)** version | size (MiB) | vs. msgspec | | |---|---|---|---| | 0.18.4 | 0.46 | 1.00x | | 2.5.2 | 6.71 | 14.66x | For applications where dependency size matters, `msgspec` is roughly 15x smaller on disk. [tool:done] web_search Search results for: *\"Pydantic vs msgspec vs validatedata\" site:dev.to* **Pydantic vs msgspec vs validatedata: Why Your Validation Library Slows ...** Coddy Posted on May 11 Pydantic vs msgspec vs validatedata: Why Your Validation Library Slows Down on Bad Data # python # validation # data # pydantic Most Python developers pick Pydantic (or msgspec) and never benchmark it seriously. Most benchmarks only test the happy path — valid data going in, valid data coming out. **Coddy - DEV Community** Pydantic vs msgspec vs validatedata: Why Your Validation Library Slows Down on Bad Data [tool:start] fetch_page {'url': 'https://dev.to/coddy/pydantic-vs-msgspec-vs-validatedata-why-your-validation-library-slows-down-on-bad-data-1b3p', 'max_chars': 12000} [tool:start] fetch_page {'url': 'https://www.inspiredpython.com/article/drawbacks-of-msgspec-compared-to-pydantic-a-deep-dive-with-examples', 'max_chars': 12000} [tool:done] fetch_page ERROR: