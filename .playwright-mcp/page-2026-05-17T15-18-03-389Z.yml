ly underserved [3] when it comes to such memory tooling. [0]: https://github.com/jcrist/msgspec - [Don't let dicts spoil your code](/posts/1394605-don-t-let-dicts-spoil-your-code)gjson [1] and a few other go packages offer a way to parse arbitrary JSON without requiring structs to hold them. re: Python. I like PyRight/PyLance for Python typing, it seems to \"just work\" afaict. I also like msgspec for dataclass like behavior [2]. --- 1: https://github.com/tidwall/gjson 2: https://jcristharif.com/msgspec/ - [Htmx, Rust and Shuttle: A New Rapid Prototyping Stack](/posts/1334185-htmx-rust-and-shuttle-a-new-rapid-prototyping-stack) - [Litestar 2.0](/posts/1318487-litestar-2-0)Full support for validation and serialisation of attrs classes and msgspec Structs. Where previously only Pydantic models and types where supported, you can now mix and match any of these three libraries. In addition to this, adding support for another modelling library has been greatly simplified with the new plugin architecture - [FastAPI 0.100.0:Release Notes](/posts/1300449-fastapi-0-100-0-release-notes)> Maybe it was very slow before That is at least partly the case. I maintain msgspec[1], another Python JSON validation library. Pydantic V1 was ~100x slower at encoding/decoding/validating JSON than msgspec, which was more a testament to Pydantic's performance issues than msgspec's speed. Pydantic V2 is definitely faster than V1, but it's still ~10x slower than msgspec, and up to 2x slower than other pure-python implementations like mashumaro. Recent benchmark here: https://gist.github.com/jcrist/d62f450594164d284fbea957fd48b... [1]: https://github.com/jcrist/msgspec - [Pydantic 2.0](/posts/1291820-pydantic-2-0)While it's definitely much faster than pydantic V1 (which is a huge accomplishment!), it's still not exactly what I'd call \"fast\". I maintain msgspec (https://github.com/jcrist/msgspec), a serialization/validation library which provides similar functionality to pydantic. Recent benchmarks of pydantic V2 against msgspec show msgspec is still 15-30x faster at JSON encoding, and 6-15x faster at JSON decoding/validating. Benchmark (and conversation with Samuel) here: https://gist.github.com/jcrist/d62f450594164d284fbea957fd48b... This is not to diminish the work of the pydantic team! For many users pydantic will be more than fast enough, and is definitely a more feature-filled tool. It's a good library, and people will be happy using it! But pydantic is not the only tool in this space, and rubbing some rust on it doesn't necessarily make it \"fast\". - [Need help developing a high performance Redis ORM for Python](/posts/1242407-need-help-developing-a-high-performance-redis-orm-for-python)https://github.com/jcrist/msgspec so I am using this instead of Pydantic. - [Blog post: Writing Python like it’s Rust](/posts/1238456-blog-post-writing-python-like-it-s-rust)Another thing: why pyserde rather than stuff like msgspec? https://github.com/jcrist/msgspec - [Show HN: Msgspec, a fast serialization/validation library for Python](/posts/1225405-show-hn-msgspec-a-fast-serialization-validation-library-for-python) - [[Guide] A Tour Through the Python Framework Galaxy: Discovering the Stars](/posts/1207008-guide-a-tour-through-the-python-framework-galaxy-discovering-the-stars)Try msgspec | Maat | turbo for fast serialization and validation ## pydantic **reviews of pydantic**. We have used some of these posts to build our list of alternatives and similar projects. The last one was on 2026-03-03. - [Fortifying LLM Applications: Robust Guardrails for AI Outputs in Python](/posts/1490611-fortifying-llm-applications-robust-guardrails-for-ai-outputs-in-python)In Python, one of the best tools for creating a validation layer is Pydantic. It uses Python's type hints to define data schemas and perform validation. This approach is declarative, easy to read, and integrates seamlessly into modern Python applications. It allows us to define the expected shape of the LLM's output as a set of classes. - [Bulletproof Data Pipelines: Adding Schema Validation to Nike Scrapers](/posts/1485210-bulletproof-data-pipelines-adding-schema-validation-to-nike-scrapers)For Python developers, Pydantic is the standard choice. The Python scrapers in the repo currently use standard dataclasses. We can upgrade these to Pydantic BaseModels for automatic validation. - [Implementing the Newtype Pattern with Zod: Enhancing Type Safety in TypeScript](/posts/1474511-implementing-the-newtype-pattern-with-zod-enhancing-type-safety-in-typescript)Python also has similar functionality in Pydantic. - [FastAPI from Zero: Writing Your First API Route](/posts/1470260-fastapi-from-zero-writing-your-first-api-route)Pydantic on the other side, is a library used for automatic data validation and serialization. In python, it is used to validate and serialize data with respect to python data types and objects respectively. Documentation - [Python Design Patterns for Clean Architecture](/posts/1458877-python-design-patterns-for-clean-architecture)Pydantic Documentation - [I built binary serializer for Pydantic models that's up to 7× smaller than JSON](/posts/1454941-i-built-binary-serializer-for-pydantic-models-that-s-up-to-7x-smaller-than-json)Found in issue where maintainer answered that they are only going to support JSON https://github.com/pydantic/pydantic/discussions/4097 - [Dict Unpacking in Python](/posts/1437257-dict-unpacking-in-python) - [A Practical Guide on Structuring LLM Outputs with Pydantic](/posts/1432912-a-practical-guide-on-structuring-llm-outputs-with-pydantic)The solution? Leverage Pydantic, a Python library that enables runtime data validation using type annotations. - [Loading Pydantic models from JSON without running out of memory](/posts/1429747-loading-pydantic-models-from-json-without-running-out-of-memory)Pydantic author here. We have plans for an improvement to pydantic where JSON is parsed iteratively, which will make way for reading a file as we parse it. Details in https://github.com/pydantic/pydantic/issues/10032. Our JSON parser, jiter (https://github.com/pydantic/jiter) already supports iterative parsing, so it's \"just\" a matter of solving the lifetimes in pydantic-core to validate as we parse. This should make pydantic around 3x faster at parsing JSON and significantly reduce the memory overhead. - [Advanced Pydantic: Generic Models, Custom Types, and Performance Tricks](/posts/1426698-advanced-pydantic-generic-models-custom-types-and-performance-tricks)Across this five-post series, we’ve journeyed from Pydantic’s basics—type validation and nested models—to advanced integrations with FastAPI, SQLAlchemy, and scalable techniques. You’ve learned how to build declarative, type-safe models, handle complex APIs, and optimize performance. To deepen your knowledge, explore the Pydantic documentation, contribute to the open-source project, or experiment with real-world use cases. Check out our GitHub repo for code samples and a Pydantic cheat sheet. Thank you for joining us—happy coding! ## What are some alternatives? **orjson** - Fast, correct Python JSON library supporting dataclasses, datetimes, and numpy **pyparsing** - Python library for creating PEG parsers **pydantic-core** - Core validation logic for pydantic written in rust **cattrs** - Composable custom class converters for attrs, dataclasses and friends. **MessagePack** - MessagePack serializer implementation for Java / msgpack.org[Java] **typeguard** - Run-time type checker for Python [tool:done] web_search No results found for: \"msgspec\" \"pydantic\" \"attrs\" \"ecosystem\" \"when to use\" blog 2025 I now have enough material from multiple sources. Let me compile the findings. [tool:start] memory_append {'entry': 'Completed research on Pydantic v2 vs attrs vs msgspec comparison. Key sources: jcristharif.com/msgspec/benchmarks.html (official msgspec benchmarks), thedataquarry.com blog posts (Pydantic v2 deep-dive), libhunt.com/compare-msgspec-v