 pydantic==2.9.0 ``` Navigate to the respective directories `v1` and `v2` to run the benchmark for each version of Pydantic. The dataset used for this benchmark is the [Wine Reviews](https://www.kaggle.com/zynicide/wine-reviews) dataset from Kaggle, containing ~130k reviews on wines along with other metadata. For convenience and ease of reproduction, the dataset is made available here as line-delimited JSON in the `data` directory. The benchmark was run using `pytest-benchmark` . See the respective version directories for steps to reproduce the benchmark results. Note - The timing numbers below are from a 2023 M3 Macbook Pro with 32GB RAM - The times reported are an average over 10 runs, with 5 warmup runs The basic validator's [schema](/prrao87/pydantic-benchmarks/blob/main/v2/schemas.py) makes use of simple Pydantic models, with very minor changes between v1 and v2. | Version | Run time (sec) | Speedup factor over v1 | |---|---|---| `1.10.14` | 2.829 | 1.0 | `2.0.3` | 0.567 | 5.0 | `2.1.1` | 0.595 | 4.8 | `2.2.1` | 0.563 | 5.0 | `2.3.0` | 0.556 | 5.1 | `2.4.2` | 0.545 | 5.2 | `2.5.3` | 0.626 | 4.5 | `2.6.0` | 0.492 | 5.7 | `2.7.0` | 0.475 | 6.0 | `2.8.2` | 0.418 | 6.8 | `2.9.0` | 0.415 | 6.8 | `2.10.2` | 0.424 | 6.7 | The improved validator's [schema](/prrao87/pydantic-benchmarks/blob/main/v2/schemas_improved.py) makes use of intermediate concepts in Pydantic, using some of the new features available in v2. It produces results that are identical to the basic validator. Note that in this case, we cannot test v1 because the features used are available only in v2. | Version | Run time (sec) | Speedup factor over v1 | |---|---|---| `2.0.3` | 0.249 | 9.1 | `2.1.1` | 0.253 | 8.9 | `2.2.1` | 0.253 | 8.9 | `2.3.0` | 0.250 | 9.0 | `2.4.2` | 0.236 | 9.6 | `2.5.3` | 0.273 | 8.2 | `2.6.0` | 0.205 | 10.9 | `2.7.0` | 0.193 | 11.6 | `2.8.2` | 0.175 | 12.8 | `2.9.0` | 0.162 | 13.9 | `2.10.2` | 0.155 | 14.3 | Tip With the right knowledge of Pydantic v2 features, it's possible to optimize and tune your validation workflow to a much greater extent. The performance gains are largely due to underlying improvements to `pydantic-core` and `PyO3` at the Rust level, that are then noticeable at Python level. [tool:start] fetch_page {'url': 'https://thedataquarry.com/posts/why-pydantic-v2-matters/', 'max_chars': 12000} [tool:start] fetch_page {'url': 'https://thedataquarry.com/posts/intermediate-pydantic/', 'max_chars': 12000} [tool:done] fetch_page Page: https://thedataquarry.com/posts/why-pydantic-v2-matters/ Title: Redirecting to: https://thedataquarry.com/blog/why-pydantic-v2-matters Redirecting from /posts/why-pydantic-v2-matters to https://thedataquarry.com/blog/why-pydantic-v2-matters [tool:done] fetch_page Page: https://thedataquarry.com/posts/intermediate-pydantic/ Title: Redirecting to: https://thedataquarry.com/blog/intermediate-pydantic Redirecting from /posts/intermediate-pydantic to https://thedataquarry.com/blog/intermediate-pydantic [tool:start] fetch_page {'url': 'https://thedataquarry.com/blog/why-pydantic-v2-matters/', 'max_chars': 12000} [tool:start] fetch_page {'url': 'https://thedataquarry.com/blog/intermediate-pydantic/', 'max_chars': 12000} [tool:done] fetch_page Page: https://thedataquarry.com/blog/why-pydantic-v2-matters/ Title: Obtain a 5x speedup for free by upgrading to Pydantic v2 If you’ve worked with any form of data wrangling in Python, you’ve likely heard of [Pydantic ⤴](https://docs.pydantic.dev/latest/). If not, welcome! In this post, I’ll show an example of why Pydantic is so integral to the workflows of data scientists and engineers, and how just a few small changes to your existing code written in v1 can be changed as per v2, to obtain a **5x speedup** and more, largely due to Pydantic’s internals being rewritten in Rust. ## What is Pydantic and why would you use it?[#](#what-is-pydantic-and-why-would-you-use-it) Unlike compiled languages (C, C++, Rust), Python is an interpreted, dynamically typed language where variables can change types during run time. This means that when you write Python code, especially for large code bases involving ETL & data transformations, it becomes necessary to test for a *lot* of edge cases. A whole class of errors (`TypeError` ) gets introduced into your Python runtime, where data obtained downstream may not align with expectations based on logic you or other developers put in, further upstream. Python 3.5 introduced [type hints ⤴](https://peps.python.org/pep-0484/), which allows developers to declare what type a variable should be, prior to runtime. However, type hints are only marginally effective because they **don’t enforce** data types at runtime — they’re only a *guide*, and not a guarantee that the data you pass around remains a certain type. What’s the solution to this? Enter Pydantic 😎. As per [their docs ⤴](https://docs.pydantic.dev/latest/#why-use-pydantic), Pydantic is a data parsing, transformation and validation library for Python that leverages the underlying information in type hints and adds additional checks and constraints via a *schema*. Any untrusted data obtained is transformed and validated to conform to the known schema during runtime. If the incoming data isn’t of the expected type or quality, Pydantic very loudly and explicitly throws an informative error, helping developers more easily trace down bugs or missing data prior to major deployments in production. Using Pydantic reduces the number of tests required, eliminating entire classes of bugs, streamlining the development process and ensuring that complex Python workflows run more reliably in production. Pydantic is a [highly used ⤴](https://pypistats.org/packages/pydantic) library and is downloaded >100 million times a month — it is used by 20 of the 25 largest companies on the NASDAQ, as well as all the biggest tech companies in the world. Clearly, ensuring type stability and cleaner, more trustworthy data upstream, offers a TON of value and can save tremendous amounts of wasted compute time in production! When you think of the sheer volume of data being handled at the largest companies on earth (most of them involving Python, due to its heavy use in data science and ML), it makes sense why Pydantic has become so important in the PyData ecosystem of today. ## Pydantic v2: A new core 🦀[#](#pydantic-v2-a-new-core) Normally, the release of a new major version of a library is just water under the bridge, and life goes on as normal. However, it’s because of where exactly Pydantic sits in the value chain — at the foundation of a host of data wrangling and ETL workflows — and the fact that its core functionality is now written in a systems-language like Rust, that makes v2 so important. If you think about it, modern software engineering and machine learning workflows rely on large batches or streams of data coming in, and it’s a well-known fact that data quality can impact multiple outcomes of a software product 1, all the way from customer engagement to insight generation and, ultimately, revenue. ### Why Rust?[#](#why-rust) I’ve already written about this in [my other blog post](/blog/rust-is-supercharging-python) on how Rust has been transforming the PyData ecosystem. Rust, being a close-to-bare-metal systems language, allows developers to build highly performant and memory-safe tooling for Python users with a lot more ease than they could in other languages. This is done via [PyO3 ⤴](https://github.com/PyO3/pyo3), a tool that allows developer to create Rust bindings for the Python interpreter, fully leveraging the underlying power and expressivity of Rust. Since 2022, PyO3 has been having more and more of an impact on the PyData ecosystem, and the lead developer of Pydantic, Samuel Colvin, has spoken 2 about the importance of the interplay between Python 🐍 and Rust 🦀, and the kind of impact this can have on the PyData ecosystem in general. In 2023, David Hewitt, a core maintainer of PyO3, a library that’s empowering a whole new generation of Python developers to write faster, more efficient packages for Python in Rust, began working at Pydantic, which further solidifies the importance of Rust in the PyData ecosystem. We're excited and proud to welcome David Hewitt to the — Pydantic (@pydantic)[@pydantic]team. David is the most active maintainer of PyO3 (Python bindings for Rust) which we already use extensively in pydantic-core. Having a Rust heavy hitter in the team will be invaluable whatever we're building.[June 20, 2023] ### How does Pydantic v2 do its magic?[#](#how-does-pydantic-v2-do-its-magic) As of v2, Pydantic is now divided into two packages: `pydantic-core` : Contains Rust bindings for the core validation and serialization logic, and doesn’t have a user-facing interface`pydantic` : A pure Python, higher level, user-facing package When you write your validation logic in Python via Pydantic v2, you’re simply defining “instructions” that are pushed down to the `pydantic-core` Rust layer. Samuel Colvin, creator of Pydantic, explains 3 how a large part of the performance gains are achieved: - Compiled Rust bindings means all the validations are happening *outside*of Python - Recursive function calls are made in Rust, which have very little additional overhead - Using a tree of small validators that call each other, making code easier to read and extend without harming performance ## Case study on Pydantic v1 vs v2[#](#case-study-on-pydantic-v1-vs-v2) Okay, enough of background, let’s see some code! ### The data[#](#the-data) The example dataset we’ll be working with is the [wine reviews dataset ⤴](https://www.kaggle.com/datasets/zynicide/wine-reviews) from Kaggle. It consists of 130k wine reviews from the Wine Enthusiast magazine, including the variety, location, winery, price, description, and some other metadata for each wine. Refer to the Kaggle source for more detailed information on the data and how it was scraped. The original data was downloaded as a single JSON file. For the purposes of this blog post, the data was then converted to newline-delimited JSON (.jsonl) format where each line of the file contains a valid JSON object. An example JSON line is shown below. ``` { \"id\": 40825, \"points\": \"90\", \"title\": \"Castello San Donato in Perano 2009 Riserva (Chianti Classico)\", \"description\": \"Made from a blend of 85% Sangiovese and 15% Merlot, this ripe wine delivers soft plum, black currants, clove and cracked pepper sensations accented with coffee and espresso notes. A backbone of firm tannins give structure. Drink now through 2019.\", \"taster_name\": \"Kerin O'Keefe\", \"taster_twitter_handle\": \"@kerinokeefe\", \"price\": \"30.0\", \"designation\": \"Riserva\", \"variety\": \"Red Blend\", \"region_1\": \"null\", \"region_2\": null, \"province\": \"Tuscany\", \"country\": \"Italy\", \"winery\": \"Castello San Donato in Perano\" } ``` ### The benchmark[#](#the-benchmark) This benchmark consists of the following data validation tasks: - Ensure the `id` field always exists (this will be the primary key), and is an integer - Ensure the `points` field is an integer - Ensure the `price` field is a float - Ensure the `country` field always has a non-null value — if it’s set as`null` or the`country` key doesn’t exist in the raw data, it*must*be set to`Unknown` . This is because the use case we defined will involve querying on`country` downstream - Remove fields like `designation` ,`province` ,`region_1` and`region_2` if they have the value`null` in the raw data — these fields will not be queried on and we do not want to unnecessarily store null values downstream #### Note on timing[#](#note-on-timing) Using a convenience library like [codetiming ⤴](https://github.com/realpython/codetiming) makes it easier to wrap the portions of the code we want to time without having to add/remove `time.time()` commands over and over. ## Schema[#](#schema) The schema file is at the root of the validation logic in Pydantic. The general practice is to use [validators ⤴](https://docs.pydantic.dev/latest/usage/validators/), which are a kind of class method in Pydantic to transform or validate data and ensure it’s of the right type and format for downstream tasks. Using validators is **far cleaner** than writing custom functions that manipulate data (they would be riddled with ugly `if-else` statements or `isinstance` clauses, not to mention that they’d need added tests). The schema below implements the validation logic defined above. ``` from pydantic import BaseModel, root_validator class Wine(BaseModel): id: int points: int title: str description: str | None price: float | None variety: str | None winery: str | None designation: str | None country: str | None province: str | None region_1: str | None region_2: str | None taster_name: str | None taster_twitter_handle: str | None @root_validator def _remove_unknowns(cls, values): \"Set other fields that have the value 'null' as None so that we can throw it away\" fields = [\"designation\", \"province\", \"region_1\", \"region_2\"] for field in fields: if not values.get(field) or values.get(field) == \"null\": values[field] = None return values @root_validator def _fill_country_unknowns(cls, values): \"Fill in missing country values with 'Unknown', as we always want this field to be queryable\" country = values.get(\"country\") if not country or country == \"null\": values[\"country\"] = \"Unknown\" return values @root_validator def _get_vineyard(cls, values): \"Rename designation to vineyard\" vineyard = values.pop(\"designation\", None) if vineyard: values[\"vineyard\"] = vineyard.strip() return values ``` The following code in Pydantic v2 performs the same actions as the v1 version. Note the changed lines highlighted in the code below. ``` from pydantic import BaseModel, model_validator class Wine(BaseModel): id: int points: int title: str description: str | None price: float | None variety: str | None winery: str | None designation: str | None country: str | None province: str | None region_1: str | None region_2: str | None taster_name: str | None taster_twitter_handle: str | None @model_validator(mode=\"before\") def _remove_unknowns(cls, values): \"Set other fields that have the value 'null' as None so that we can throw it away\" fields = [\"designation\", \"province\", \"region_1\", \"region_2\"] for field in fields: if not values.get(field) or values.get(field) == \"null\": values[field] = None return values @model_validator(mode=\"before\") def _fill_country_unknowns(cls, values): \"Fill in missing country values with 'Unknown', as we always want this field to be queryable\" country = values.get(\"country\") if not country or country == \"null\": values[\"country\"] = \"Unknown\" return values @model_validator(mode=\"before\") def _get_vineyard(cls, values): \"Rename designation to vineyard\" vineyard = values.pop(\"designation\", None) if vineyard: values[\"vineyard\"] = vineyard.strip() return values ``` ## root_validator vs. model_validator[#](#root_validator-vs-model_validator) - In Pydantic v2, `root_validator` is deprecated, and we instead use`model_validator` - In a similar way, `validator` is deprecated and we instead use`field_validator` where we may need to validate specific fields (not used in this example) - In a similar way, - The keyword arguments to the `model_validator` differ from v1’s`root_validat [truncated — page exceeded 12000 chars] [tool:done] fetch_page Page: https://thedataquarry.com/blog/intermediate-pydantic/ Title: Why Pydantic just keeps getting better ## 12x speedup over v1 (with more to come)[#](#12x-speedup-over-v1-with-more-to-come) [Pydantic ⤴](https://docs.pydantic.dev/latest/) is a data parsing, transformation and validation library for Python that’s become integral to the PyData ecosystem. Version 2 of Pydantic, which came out in June 2023, had its core rewritten in Rust, which I described in some detail in my [previous post](/blog/why-pydantic-v2-matters). It’s been really fascinating to watch each major release of Pydantic v2 lately, as they’ve been showing incremental performance improvements over prior releases. As can be seen, there’s not only a **12x** speedup over v1.10 in the latest release (2.5.2 as of writing this post) — there’s also a **12%** improvement over the first v2 release. These improvements are likely due to a variety of optimizations and new features at the lower levels in Rust. The goal of this post is to describe the details of the benchmark whose results are shown above, and also to uncover the underlying components of `pydantic-core` (the part that’s written in Rust) that contribute to the overall performance improvement that we see at the Python level. ## Unraveling the Pydantic stack[#](#unraveling-the-pydantic-stack) Before we go into the benchmark and the reasons for the performance gain, it’s worth spending a bit of time to really understand Pydantic’s internals. As we know, v2 has a new design that splits it up into two Python packages: `pydantic` : Written in Python and is user-facing`pydantic-core` : A base Python package that contains the core functionality for serialization and validation, whose core is based on Rust The Python API we, the end users, are used to interfacing with, is built directly on top of `pydantic-core` . However, it’s important to understand that `pydantic-core` itself is not a monolithic entity. The lowest layers of Pydantic are composed of a multitude of Rust crates that form what we know as `pydantic-core` . The top (user-facing) layer is the Python API. The intermediate layers, PyO3 and `maturin` , are explained in more detail below. ### Rust crates[#](#rust-crates) [ speedate ⤴](https://github.com/pydantic/speedate) is a datetime and time duration parser that functions at the Rust level. [is an iterable JSON parser that offers multiple interfaces for handling JSON data (enums, iterators and strings) in Rust. The](https://github.com/pydantic/jiter) `jiter` ⤴[regex ⤴](https://github.com/rust-lang/regex)crate is the regex engine that’s maintained by the Rust foundation. There are many other base crates as well, coming together to compose what we know as `pydantic-core` .Earlier versions of Pydantic v2 used `orjson` (a Python library), which itself depended on the age-old [ serde_json ⤴](https://github.com/serde-rs/json) Rust crate for JSON parsing. `serde_json` is among the most downloaded Rust crates, with almost 200 million downloads as of 2023, so the fact that the Pydantic team decided to move away from such a mature package in the Rust ecosystem to write their own JSON parser indicates how critical this part of the stack is to Pydantic’s performance.As the creator of Pydantic himself explains: orjson uses serde-json, to deserialize JSON, then takes some serious liberties with the Python C API/PyO3 FFI interface for performance. — Samuel Colvin (@samuelcolvin) 🧵[November 2, 2023] With JSON being the key serialization and deserialization component in Pydantic workflows, and with Pydantic being used to validate ever larger amounts of data, every ounce of performance matters! ### PyO3[#](#pyo3) [PyO3 ⤴](https://github.com/PyO3/pyo3) is a Rust crate that allows Rust code to be called from Python, via generated Rust bindings. It’s a fork of `rust-cpython` , which aims to offer a Rust wrapper around the `libpython` C API so that Rust code can be called from Python. PyO3 is now a mature project with a large community, and is the most common way to write performant Python extensions in Rust. Recent versions of Pydantic have begun applying **profile-guided optimization** (PGO) during `pydantic-core` compilation. As described in [the docs ⤴](https://doc.rust-lang.org/rustc/profile-guided-optimization.html), PGO collects data about the typical execution of a binary and uses this data to inform optimizations such as inlining, machine code layout, register allocation, and branch prediction. The result is that the `pydantic-core` bindings, even prior to being called in Python, are already optimized for the typical execution patterns of Pydantic. ### Maturin[#](#maturin) [Maturin ⤴](https://github.com/PyO3/maturin) is a utility that’s used to generate native Python modules (wheels) from Rust crates that were built with PyO3. The result of using Maturin is that the underlying Rust code in `pydantic-core` can be made available as a Python package that’s itself imported into `pydantic` , to be available to end users. ### Pydantic[#](#pydantic) The user-facing part of Pydantic, written in Python, is essentially a wrapper around `pydantic-core` . None of the heavy-lifting is done at the Python level — all the parsing, validation and serialization is done at the Rust level, so Python users can continue about their business as usual without worrying about Rust. ## Performance benchmark[#](#performance-benchmark) This section covers the benchmark that was run to study the performance improvements in each major release of v2, with the reference version (for comparison) being v1.10. The benchmark code is available [here ⤴](https://github.com/prrao87/pydantic-benchmarks). ### Dataset[#](#dataset) The dataset used is a familiar one if you’ve read my previous blogs: A wine reviews dataset from Kaggle. It consists of 129,971 wine reviews from the Wine Enthusiast magazine, made available in newline-delimited JSON as shown below. Refer to the [Kaggle source ⤴](https://www.kaggle.com/datasets/zynicide/wine-reviews) for more detailed information on the dataset and how it was scraped. An example JSON line representing a single wine review, when read into Python, is shown below. Note how the comments in each line specify what we *want*, vs. what’s actually present in the data. ``` { \"id\": 40825, # This field is compulsory (not nullable) \"points\": \"90\", # Bad value: This should be an integer \"title\": \"Castello San Donato in Perano 2009 Riserva (Chianti Classico)\", \"description\": \"Made from a blend of 85% Sangiovese and 15% Merlot, this ripe wine delivers soft plum, black currants, clove and cracked pepper sensations accented with coffee and espresso notes. A backbone of firm tannins give structure. Drink now through 2019.\", \"taster_name\": \"Kerin O'Keefe\", \"taster_twitter_handle\": \"@kerinokeefe\", \"price\": \"30.0\", # Bad value: This should be a float \"designation\": \"Riserva\", # Rename this to \"vineyard\" \"variety\": \"Red Blend\", \"region_1\": \"null\", # Drop string 'null' fields \"region_2\": None, # Drop None fields \"province\": \"Tuscany\", \"country\": \"Italy\", # Missing country is unacceptable: replace with \"Unknown \"winery\": \"Castello San Donato in Perano\" } ``` ### Simple validator[#](#simple-validator) The first benchmark makes use of a simple validator based on familiar Pydantic concepts — fields, validators and models. The validator is shown below. ``` from pydantic import BaseModel, ConfigDict, Field, model_validator class Wine(BaseModel): model_config = ConfigDict( populate_by_name=True, str_strip_whitespace=True, ) id: int points: int title: str description: str | None price: float | None variety: str | None winery: str | None designation: str | None = Field(None, alias=\"vineyard\") country: str | None province: str | None region_1: str | None region_2: str | None taster_name: str | None taster_twitter_handle: str | None @model_validator(mode=\"before\") def _remove_unknowns(cls, values): \"Set other fields that have the value 'null' as None so that we can throw it away\" for field in [\"region_1\", \"region_2\"]: if not values.get(field) or values.get(field) == \"null\": values[field] = None return values @model_validator(mode=\"before\") def _fill_country_unknowns(cls, values): \"Fill in missing country values with 'Unknown', as we always want this field to be queryable\" country = values.get(\"country\") if not country or country == \"null\": values[\"country\"] = \"Unknown\" return values ``` The goal of the validator is to coerce bad data types to the types we want, and to drop fields that we don’t want, or are missing. In addition, the `model_config` is used to strip whitespace from all string fields, and to populate specific fields by an alias. `model_validator` class methods are used to modify elements of a dict as they are parsed, before validation. ### Improved validator[#](#improved-validator) The improved validator makes use of some new features in Pydantic v2 as shown below. ``` from pydantic import BeforeValidator, TypeAdapter, constr, field_validator from pydantic_core import PydanticOmit from typing_extensions import Annotated, NotRequired, TypedDict not_required_fields = [\"region_1\",\"region_2\"] def exclude_none(s: str | None) -> str: if s is None: # since we want `exclude_none=True` in the end, # just omit it if it's `None` during validation raise PydanticOmit else: return s ExcludeNoneStr = Annotated[str, BeforeValidator(exclude_none)] class Wine(TypedDict): id: int points: int title: str description: NotRequired[str] price: NotRequired[float] variety: NotRequired[str] winery: NotRequired[str] designation: NotRequired[constr(strip_whitespace=True)] country: NotRequired[str] province: NotRequired[str] region_1: NotRequired[str] region_2: NotRequired[str] taster_name: NotRequired[str] taster_twitter_handle: NotRequired[str] @field_validator(*not_required_fields, mode=\"before\") def omit_null_none(cls, v): # type: ignore if v is None or v == \"null\": raise PydanticOmit else: return v @field_validator(\"country\", mode=\"before\") def country_unknown(cls, s: str | None) -> str: # type: ignore if s is None or s == \"null\": return \"Unknown\" else: return s WinesTypeAdapter = TypeAdapter(list[Wine]) ``` There are a number of differences between this validator and the previous one: - The `Wine` model in the improved version is ainstead of a`TypedDict` ⤴`BaseModel` . This is a new feature in Pydantic v2 that allows us to define a schema using Python’s native`TypedDict` type (which, at runtime, is a plain`dict` ) - `field_validator` is used instead of`model_validator` . These operate only on specific fields, and we apply the the`NotRequired` type to all fields that we want to be able to omit from the final output if their value is either`None` or`'null'` . This is done via a new exception type`PydanticOmit` - A `TypeAdapter` is used, which exposes only[some of the functionality ⤴](https://docs.pydantic.dev/latest/api/type_adapter/)of`BaseModel` . This is much more performant, as it avoids the overhead of the`BaseModel` class when simply performing validation on a`dict` . Because these features listed above are unique to Pydantic v2, the improved validator can only be run on v2.x and not on v1. ### Benchmark code[#](#benchmark-code) The benchmark is run using `pytest-benchmark` . The data is first loaded into a test fixture. ``` from typing import Any from pathlib import Path from util import get_json_data # A helper function to load data via srsly import pytest @pytest.fixture def data() -> list[dict[str, Any]]: \"\"\"Load the data once per session\"\"\" DATA_DIR = Path(\"/path/to/data\") FILENAME = \"winemag-data-130k-v2.jsonl.gz\" data = list(get_json_data(DATA_DIR, FILENAME)) return data ``` The key-value pairs from each JSON record in the dataset are unpacked as `kwargs` and passed to the validator to produce a Pydantic mode as shown below. The model is then dumped back to a `dict` via `model_dump` for downstream use. ``` def validate(data): \"\"\"Validate a list of JSON blobs against the Wine schema\"\"\" validated_data = [Wine( [truncated — page exceeded 12000 chars] Now let me get the GitHub benchmark gist and the \"when not to use pydantic\" article. [tool:start] web_search {'query': 'github gist msgspec pydantic v2 benchmark comparison', 'max_results': 5} [tool:start] web_search {'query': '\"when not to use pydantic\" msgspec attrs blog 2025', 'max_results': 5} [tool:done] web_search Search results for: *github gist msgspec pydantic v2 