adapter: openai
model: gpt-4.1-nano
temperature: 0.2
tools:
  - file_read
  - file_list
  - file_write
  - file_edit
  - file_delete
  - read_agent_logs
  - memory_append
  - notes_read
  - notes_write
  - notes_append
  - health_log
  - heal_agent_settings
  - show_agent_settings
  - shared_knowledge_append
  - search_memory
  # ── Delegation (Phase 7 — Doctor as actor) ────────────────────
  - spawn_agent
  - kill_agent
  - check_task_status
delegation_targets:
  - builder
  - planning
autonomy_envelope:
  can_kill_agents: [builder, keeper, cron]
  cannot_kill: [master, doctor]
  can_create_tasks: true
  max_tasks_per_run: 3
runner:
  max_turns: 10
  task_timeout: 120
