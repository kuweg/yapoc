# NOTE: For agents listed in app/config/agent-settings.json, the values
# below are NOT authoritative at runtime. The runtime config-resolution
# order is:
#   1. app/config/agent-settings.json (adapter, model, temperature,
#      max_tokens, fallbacks, tools — authoritative when present)
#   2. THIS FILE (CONFIG.yaml) — fallback for fields not in agent-settings.json
#   3. NOTES.MD [config] block (legacy)
#   4. app/config/settings.py defaults
# Sandbox + runner blocks are still read from this file at all times.
# If you edit adapter/model here expecting it to apply, ALSO update
# app/config/agent-settings.json.

# NOTE: health_issues counter in observability may be stale after
# HEALTH.MD is cleared. The counter is not automatically reset.
adapter: deepseek
model: deepseek-chat
temperature: 0.2
tools:
  - get_recent_signals
  - file_read
  - file_write
  - file_list
  - search_memory
  - memory_append
  - notes_read
  - notes_write
  - notes_append
  - health_log
  - notify_parent
  - shared_knowledge_append
  - learnings_append
# Sandbox: the evaluator may ONLY write to its own directory + REPORT.MD.
# All other paths are forbidden. This is the safety boundary that makes
# a read-only evaluator possible: even if the LLM tries to apply a
# proposal it shouldn't, the file_write sandbox blocks it.
sandbox:
  forbidden:
    - app/agents/master/
    - app/agents/planning/
    - app/agents/builder/
    - app/agents/keeper/
    - app/agents/cron/
    - app/agents/doctor/
    - app/agents/model_manager/
    - app/agents/librarian/
    - app/agents/researcher/
    - app/agents/base/
    - app/backend/
    - app/cli/
    - app/utils/
    - app/config/
    - app/frontend/
    - docs/
    - scripts/
    - plugins/
    - .env
    - pyproject.toml
runner:
  max_turns: 25
  task_timeout: 300
  poll_interval: 30
  retry_attempts: 2
  context_memory_limit: 10
  context_health_limit: 5
  context_notes_limit: 2000
