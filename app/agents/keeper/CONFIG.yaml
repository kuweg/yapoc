# NOTE: For agents listed in app/config/agent-settings.json, the values
# below are NOT authoritative at runtime. The runtime config-resolution
# order is:
#   1. app/config/agent-settings.json (adapter, model, temperature,
#      max_tokens, fallbacks, tools — authoritative when present)
#   2. THIS FILE (CONFIG.yaml) — fallback for fields not in agent-settings.json
#   3. NOTES.MD [config] block (legacy)
#   4. app/config/settings.py defaults
# Sandbox + runner blocks are still read from this file at all times.
# If you edit adapter/model here expecting it to apply, ALSO update
# app/config/agent-settings.json.

adapter: openai
model: gpt-4.1-nano
temperature: 0.2
tools:
  - file_read
  - file_list
  - file_write
  - file_edit
  - file_delete
  - shell_exec
  - memory_append
  - notes_read
  - notes_write
  - health_log
  - notify_parent
  - shared_knowledge_append
  - search_memory
  # ── Peer delegation ────────────────────────────────────────────────────
  - spawn_agent
  - wait_for_agent
  - check_task_status
delegation_targets:
  - builder
sandbox:
  # Keeper may touch config files and app/config/ only. Everything else
  # (app/agents, app/utils, docs, scripts, etc.) is off-limits — if
  # Keeper ever needs to change code, it should delegate to Builder.
  forbidden:
    - app/agents/
    - app/backend/
    - app/cli/
    - app/utils/
    - docs/
    - scripts/
    - README.md
  # shell_exec is locked down to poetry-only. Keeper is the dependency
  # gatekeeper; it has no legitimate reason to run anything else.
  shell_allowlist:
    - poetry
runner:
  max_turns: 15
  task_timeout: 300
  poll_interval: 30
  retry_attempts: 3
  context_memory_limit: 10
  context_health_limit: 5
  context_notes_limit: 1500
