# NOTE: For agents listed in app/config/agent-settings.json, the values
# below are NOT authoritative at runtime. The runtime config-resolution
# order is:
#   1. app/config/agent-settings.json (adapter, model, temperature,
#      max_tokens, fallbacks, tools — authoritative when present)
#   2. THIS FILE (CONFIG.yaml) — fallback for fields not in agent-settings.json
#   3. NOTES.MD [config] block (legacy)
#   4. app/config/settings.py defaults
# Sandbox + runner blocks are still read from this file at all times.
# If you edit adapter/model here expecting it to apply, ALSO update
# app/config/agent-settings.json.

adapter: deepseek
model: deepseek-chat
temperature: 0.1
max_tokens: 8096
tools:
  - file_read
  - file_write
  - file_edit
  - file_delete
  - file_list
  - memory_append
runner:
  task_timeout: 300
