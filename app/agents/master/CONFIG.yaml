# NOTE: For agents listed in app/config/agent-settings.json, the values
# below are NOT authoritative at runtime. The runtime config-resolution
# order is:
#   1. app/config/agent-settings.json (adapter, model, temperature,
#      max_tokens, fallbacks, tools — authoritative when present)
#   2. THIS FILE (CONFIG.yaml) — fallback for fields not in agent-settings.json
#   3. NOTES.MD [config] block (legacy)
#   4. app/config/settings.py defaults
# Sandbox + runner blocks are still read from this file at all times.
# If you edit adapter/model here expecting it to apply, ALSO update
# app/config/agent-settings.json.

adapter: deepseek
model: deepseek-chat
temperature: 0.3
tools:
  # ── Reads (safe, do them yourself) ──────────────────────────────────
  - file_read
  - file_list
  - file_write
  - file_edit
  - file_delete
  - show_agent_settings
  # ── Delegation ──────────────────────────────────────────────────────
  - spawn_agent
  - ping_agent
  - kill_agent
  - wait_for_agent
  - wait_for_agents
  - execute_dag
  - check_task_status
  - read_task_result
  - read_agent_logs
  # ── Self ────────────────────────────────────────────────────────────
  - server_restart
  - process_restart
  - web_search
  - memory_append
  - notes_read
  - notes_write
  - notes_append
  - health_log
  - agent_amnesia
  - search_memory
  - learnings_append
  - shared_knowledge_append
  - image_read
sandbox:
  # Master can read anything but writes must go through a sub-agent.
  forbidden:
    - .env
    - app/config/settings.py
    - pyproject.toml
runner:
  # task_timeout: 0 means unbounded — master is the autonomous orchestrator
  # and must not be killed by an externally-imposed per-task duration.
  # Sub-agents keep their own task_timeout. Cost control lives in
  # budget_per_agent_usd / budget_per_task_usd (see settings.py).
  task_timeout: 0
  poll_interval: 30
  retry_attempts: 3
  context_memory_limit: 10
  context_health_limit: 5
  context_notes_limit: 3000
